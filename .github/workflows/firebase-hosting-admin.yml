name: Deploy Web Admin to Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'web-admin/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/firebase-hosting-admin.yml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: web-admin
        run: npm install

      - name: Build web admin
        working-directory: web-admin
        env:
          VITE_FIREBASE_API_KEY: AIzaSyBscnKyw3dldC7UudkzDd3XNBWRFxr9ZM0
          VITE_FIREBASE_AUTH_DOMAIN: saudiedu-3fe68.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: saudiedu-3fe68
          VITE_FIREBASE_STORAGE_BUCKET: saudiedu-3fe68.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '520109867273'
          VITE_FIREBASE_APP_ID: 1:520109867273:web:1cf56b39896f81205293d8
          VITE_ADMIN_EMAILS: jaamyyy@gmail.com
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SAUDIEDU_3FE68 }}'
          projectId: saudiedu-3fe68
          channelId: live
